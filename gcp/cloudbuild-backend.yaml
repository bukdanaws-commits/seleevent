# =============================================================================
#  Cloud Build Configuration — EVENTKU Golang Backend API
#
#  Triggers:
#    - Push to main branch
#    - Manual: gcloud builds submit --config gcp/cloudbuild-backend.yaml
# =============================================================================

steps:
  # ── Build Go binary (static, no CGO) ──────────────────────────────────────
  - name: 'golang:1.24'
    id: 'build-binary'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd backend
        echo "📦 Downloading Go modules..."
        go mod download
        echo "🔨 Building static binary..."
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags="-s -w -X main.version=${COMMIT_SHA:0:8}" \
          -o /workspace/eventku-api ./cmd/server
        echo "✅ Binary built successfully"

  # ── Build Docker image ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/docker/eventku-api:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/docker/eventku-api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '--build-arg=BINARY_PATH=/workspace/eventku-api'
      - '.'

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/docker/eventku-api']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eventku-api'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/docker/eventku-api:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--cpu=2'
      - '--memory=1Gi'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--concurrency=80'
      - '--timeout=3600'
      - '--port=8080'
      - '--set-env-vars=APP_ENV=production,DB_DRIVER=postgres,DB_HOST=/cloudsql/$PROJECT_ID:$_REGION:$_INSTANCE_NAME,DB_NAME=eventku,DB_USER=eventku,DB_PORT=5432,GOOGLE_CLIENT_ID=503551786622-k3uajo9c2d6om6qnqofsa3b47fvo5o6g.apps.googleusercontent.com'
      - '--set-secrets=DB_PASSWORD=database-password:latest,JWT_SECRET=jwt-secret:latest,REFRESH_JWT_SECRET=refresh-jwt-secret:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest'
      - '--add-cloudsql-instances=$PROJECT_ID:$_REGION:$_INSTANCE_NAME'
      - '--service-account=eventku-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--no-cpu-throttling'

# ── Default substitution values ─────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast1
  _PROJECT_ID: eventku-494416
  _INSTANCE_NAME: eventku-db

# ── Build options ───────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
