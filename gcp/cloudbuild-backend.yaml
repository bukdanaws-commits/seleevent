# =============================================================================
#  Cloud Build Configuration — EVENTKU Golang Backend API
#
#  Build strategy:
#    Step 1: Build Go binary externally (faster with Cloud Build machine type)
#    Step 2: Build Docker image using pre-built binary (no rebuild inside Docker)
#    Step 3: Push to Artifact Registry
#    Step 4: Deploy to Cloud Run
#
#  Triggers:
#    - Push to main branch
#    - Manual: gcloud builds submit --config gcp/cloudbuild-backend.yaml
# =============================================================================

steps:
  # ── Build Go binary (static, no CGO) ──────────────────────────────────────
  - name: 'golang:1.25'
    id: 'build-binary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        echo "📦 Downloading Go modules..."
        go mod download
        echo "🔨 Building static binary..."
        SHORT_SHA=${COMMIT_SHA:0:8}
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags="-s -w -X main.version=$SHORT_SHA" \
          -o eventku-api ./cmd/server
        echo "✅ Binary built successfully at backend/eventku-api"

  # ── Build Docker image (uses pre-built binary) ────────────────────────────
  # The Dockerfile supports BINARY_PATH build arg — when provided, it copies
  # the pre-built binary instead of rebuilding from source.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/eventku-api:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/eventku-api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '--build-arg=BINARY_PATH=backend/eventku-api'
      - '.'
    waitFor: ['build-binary']

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/eventku-api']
    waitFor: ['build-image']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eventku-api'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/eventku-api:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--cpu=2'
      - '--memory=1Gi'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--concurrency=80'
      - '--timeout=3600'
      - '--port=8080'
      - '--no-cpu-throttling'
      - '--set-env-vars=APP_ENV=production,DB_DRIVER=postgres,DB_HOST=/cloudsql/$PROJECT_ID:$_REGION:$_INSTANCE_NAME,DB_NAME=eventku,DB_USER=eventku,DB_PORT=5432,MIDTRANS_IS_SANDBOX=true,STORAGE_BUCKET_NAME=eventku_data'
      - '--set-secrets=DB_PASSWORD=database-password:latest,JWT_SECRET=jwt-secret:latest,REFRESH_JWT_SECRET=refresh-jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,MIDTRANS_MERCHANT_ID=midtrans-merchant-id:latest,MIDTRANS_SERVER_KEY=midtrans-server-key:latest,MIDTRANS_CLIENT_KEY=midtrans-client-key:latest'
      - '--add-cloudsql-instances=$PROJECT_ID:$_REGION:$_INSTANCE_NAME'
      - '--service-account=eventku-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
    waitFor: ['push-image']

# ── Default substitution values ─────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast2
  _INSTANCE_NAME: eventku
  _REPO: eventku

# ── Build options ───────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
