# =============================================================================
#  Cloud Build Configuration — EVENTKU Golang Backend API
#
#  Supports two environments via _DEPLOY_ENV substitution:
#    staging    → Midtrans SANDBOX, eventku-api-staging service
#    production → Midtrans PRODUCTION, eventku-api service
#
#  Deploy staging:
#    gcloud builds submit --config=gcp/cloudbuild-backend.yaml \
#      --substitutions=_DEPLOY_ENV=staging
#
#  Deploy production:
#    gcloud builds submit --config=gcp/cloudbuild-backend.yaml \
#      --substitutions=_DEPLOY_ENV=production
# =============================================================================

steps:
  # ── Build Go binary (static, no CGO) ──────────────────────────────────────
  - name: 'golang:1.25'
    id: 'build-binary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        echo "📦 Downloading Go modules..."
        go mod download
        echo "🔨 Building static binary..."
        SHORT_SHA=${_COMMIT_SHA:0:8}
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags="-s -w -X main.version=$SHORT_SHA" \
          -o eventku-api ./cmd/server
        echo "✅ Binary built successfully at backend/eventku-api"

  # ── Build Docker image (uses pre-built binary) ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$_COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '--build-arg=BINARY_PATH=eventku-api'
      - 'backend'
    waitFor: ['build-binary']

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME']
    waitFor: ['build-image']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🚀 Deploying $_DEPLOY_ENV backend..."

        # Set MIDTRANS_IS_SANDBOX based on environment
        if [ "$_DEPLOY_ENV" = "production" ]; then
          MIDTRANS_SANDBOX="false"
          echo "💰 Using Midtrans PRODUCTION keys"
        else
          MIDTRANS_SANDBOX="true"
          echo "🧪 Using Midtrans SANDBOX keys"
        fi

        gcloud run deploy $_SERVICE_NAME \
          --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$_COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --cpu=2 \
          --memory=1Gi \
          --min-instances=1 \
          --max-instances=1 \
          --concurrency=80 \
          --timeout=3600 \
          --port=8080 \
          --no-cpu-throttling \
          --set-env-vars=APP_ENV=$_DEPLOY_ENV,DB_DRIVER=postgres,DB_HOST=/cloudsql/$PROJECT_ID:$_REGION:$_INSTANCE_NAME,DB_NAME=eventku,DB_USER=eventku,DB_PORT=5432,MIDTRANS_IS_SANDBOX=$${MIDTRANS_SANDBOX},STORAGE_BUCKET_NAME=eventku_data \
          --set-secrets=DB_PASSWORD=database-password:latest,JWT_SECRET=jwt-secret:latest,REFRESH_JWT_SECRET=refresh-jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,MIDTRANS_MERCHANT_ID=midtrans-merchant-id:latest,MIDTRANS_SERVER_KEY=midtrans-server-key:latest,MIDTRANS_CLIENT_KEY=midtrans-client-key:latest \
          --add-cloudsql-instances=$PROJECT_ID:$_REGION:$_INSTANCE_NAME \
          --service-account=eventku-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --allow-unauthenticated

        echo "✅ Backend deployed: $_SERVICE_NAME ($_DEPLOY_ENV)"
    waitFor: ['push-image']

# ── Default substitution values ─────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast2
  _INSTANCE_NAME: eventku
  _REPO: eventku
  _SERVICE_NAME: eventku-api-staging
  _COMMIT_SHA: manual
  _DEPLOY_ENV: staging

# ── Build options ───────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
