# =============================================================================
#  Cloud Build Configuration — EVENTKU Next.js Frontend
#
#  Supports two environments via _DEPLOY_ENV substitution:
#    staging    → Midtrans SANDBOX, eventku-web-staging service
#    production → Midtrans PRODUCTION, eventku-web service
#
#  Deploy staging:
#    gcloud builds submit --config=gcp/cloudbuild-frontend.yaml \
#      --substitutions=_DEPLOY_ENV=staging,_BACKEND_URL=https://eventku-api-staging-xxxxx.a.run.app
#
#  Deploy production:
#    gcloud builds submit --config=gcp/cloudbuild-frontend.yaml \
#      --substitutions=_DEPLOY_ENV=production,_BACKEND_URL=https://eventku-api-xxxxx.a.run.app
# =============================================================================

steps:
  # ── Install dependencies ──────────────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'install-deps'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g bun
        echo "📦 Installing dependencies..."
        bun install
        echo "✅ Dependencies installed"

  # ── Build Next.js application ─────────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'build-nextjs'
    entrypoint: 'sh'
    env:
      - 'NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - 'NEXT_PUBLIC_GO_PORT=8080'
      - 'NEXT_PUBLIC_USE_DIRECT_BACKEND=true'
      - 'NEXT_PUBLIC_MOCK_MODE=false'
      - 'NEXT_PUBLIC_MIDTRANS_CLIENT_KEY=$_MIDTRANS_CLIENT_KEY'
      - 'NEXT_PUBLIC_MIDTRANS_IS_SANDBOX=$_MIDTRANS_IS_SANDBOX'
      - 'NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID'
      - 'NODE_ENV=production'
    args:
      - '-c'
      - |
        echo "🔨 Building Next.js for $_DEPLOY_ENV..."
        echo "   API URL: $NEXT_PUBLIC_API_URL"
        echo "   Midtrans Sandbox: $NEXT_PUBLIC_MIDTRANS_IS_SANDBOX"
        bun run build
        echo "✅ Next.js build complete"
    waitFor: ['install-deps']

  # ── Build Docker image ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$_COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '--build-arg=NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - '--build-arg=NEXT_PUBLIC_GO_PORT=8080'
      - '--build-arg=NEXT_PUBLIC_USE_DIRECT_BACKEND=true'
      - '--build-arg=NEXT_PUBLIC_MOCK_MODE=false'
      - '--build-arg=NEXT_PUBLIC_MIDTRANS_CLIENT_KEY=$_MIDTRANS_CLIENT_KEY'
      - '--build-arg=NEXT_PUBLIC_MIDTRANS_IS_SANDBOX=$_MIDTRANS_IS_SANDBOX'
      - '--build-arg=NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID'
      - '.'
    waitFor: ['build-nextjs']

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME']
    waitFor: ['build-image']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=300'
      - '--port=3000'
      - '--service-account=eventku-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--set-env-vars=APP_ENV=$_DEPLOY_ENV,NODE_ENV=production'
    waitFor: ['push-image']

# ── Default substitution values ─────────────────────────────────────────────
# Staging defaults — override for production
substitutions:
  _REGION: asia-southeast2
  _REPO: eventku
  _DEPLOY_ENV: staging
  _SERVICE_NAME: eventku-web-staging
  _BACKEND_URL: https://eventku-api-staging-xxxxx.a.run.app
  _MIDTRANS_CLIENT_KEY: Mid-client-sJtCsptoF8hoaFgN
  _MIDTRANS_IS_SANDBOX: 'true'
  _GOOGLE_CLIENT_ID: 503551786622-k3uajo9c2d6om6qnqofsa3b47fvo5o6g.apps.googleusercontent.com
  _COMMIT_SHA: manual

# ── Build options ───────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
